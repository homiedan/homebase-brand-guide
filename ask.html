<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask the Homebase Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Druk';
      src: url('Druk-Bold-Web.woff') format('woff');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:      #7E3DD4;
      --deep:        #1E0B3A;
      --white:       #FFFFFF;
      --grey01:      #FBFBFB;
      --grey02:      #F6F6F6;
      --grey03:      #EFEFEF;
      --grey05:      #AAAAAA;
      --rain:        #D5C7FF;
      --rain100:     #E7DFFF;
      --rain50:      #F3EFFF;
      --yellow:      #E0FF00;
      --pink:        #E55CCD;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--grey01);
      color: var(--deep);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO ──────────────────────────────────────────────── */
    .hero {
      position: relative;
      background: var(--deep);
      color: var(--white);
      overflow: hidden;
      padding: 80px 24px 120px;
      text-align: center;
    }
    /* organic blurred colour blobs — grainy-gradient feel */
    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      pointer-events: none;
    }
    .hero::before {
      width: 620px; height: 620px;
      background: var(--purple);
      top: -220px; left: -120px;
    }
    .hero::after {
      width: 520px; height: 520px;
      background: var(--pink);
      bottom: -260px; right: -100px;
      opacity: 0.30;
    }
    .hero-inner { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--rain);
      background: rgba(213,199,255,0.12);
      border: 1px solid rgba(213,199,255,0.25);
      padding: 7px 16px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    h1.hero-title {
      font-family: 'Druk', sans-serif;
      text-transform: uppercase;
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.01em;
      font-size: clamp(48px, 9vw, 104px);
      margin-bottom: 22px;
    }
    h1.hero-title .accent { color: var(--rain); }

    .hero-sub {
      font-size: clamp(16px, 2.4vw, 20px);
      font-weight: 500;
      line-height: 1.5;
      color: rgba(255,255,255,0.78);
      max-width: 560px;
      margin: 0 auto 40px;
    }

    /* ─── SEARCH BAR ────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      max-width: 620px;
      margin: 0 auto;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--white);
      border-radius: 100px;
      padding: 6px 8px 6px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.15);
    }
    .search-icon { flex-shrink: 0; color: var(--purple); display: flex; }
    #q {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 18px;
      font-weight: 500;
      color: var(--deep);
      padding: 16px 0;
    }
    #q::placeholder { color: var(--grey05); }
    .clear-btn {
      display: none;
      border: none;
      background: var(--grey03);
      color: var(--deep);
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .clear-btn:hover { background: var(--grey05); color: var(--white); }
    .clear-btn.show { display: block; }

    /* example chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }
    .chip {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      padding: 9px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { background: rgba(255,255,255,0.18); color: #fff; }

    /* ─── RESULTS ───────────────────────────────────────────── */
    .results-section {
      max-width: 780px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }
    .results-meta {
      font-size: 14px;
      font-weight: 600;
      color: var(--grey05);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--grey03);
      border-radius: 20px;
      padding: 26px 28px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(30,11,58,0.04);
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      animation: rise 0.28s ease both;
    }
    .card:hover {
      box-shadow: 0 12px 40px rgba(30,11,58,0.10);
      transform: translateY(-2px);
      border-color: var(--rain);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--purple);
      background: var(--rain50);
      padding: 5px 11px;
      border-radius: 100px;
      margin-bottom: 14px;
    }
    .card h3 {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .card .answer {
      font-size: 15.5px;
      font-weight: 500;
      line-height: 1.65;
      color: #4a3d5e;
    }
    .card .answer strong { color: var(--deep); font-weight: 700; }
    .card .answer ul { margin: 8px 0 0 18px; }
    .card .answer li { margin-bottom: 4px; }
    .card .answer code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      background: var(--grey02);
      padding: 2px 6px;
      border-radius: 5px;
      color: var(--purple);
    }

    /* colour swatches inside answers */
    .swatches { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .swatch {
      display: flex; align-items: center; gap: 9px;
      background: var(--grey01);
      border: 1px solid var(--grey03);
      border-radius: 10px;
      padding: 7px 12px 7px 8px;
      font-size: 13px; font-weight: 600;
    }
    .swatch .dot {
      width: 22px; height: 22px; border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0;
    }
    .swatch .hex {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--grey05); font-weight: 500; font-size: 12px;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 14px;
      font-weight: 700;
      color: var(--purple);
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }
    .card-link .arrow { transition: transform 0.15s; }
    .card:hover .card-link .arrow { transform: translateX(3px); }

    /* empty / no-results states */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--grey05);
    }
    .empty h3 { font-size: 20px; font-weight: 800; color: var(--deep); margin-bottom: 8px; }
    .empty p { font-size: 15px; font-weight: 500; line-height: 1.6; max-width: 420px; margin: 0 auto; }

    /* browse-all hint shown before searching */
    .browse-title {
      font-family: 'Druk', sans-serif;
      text-transform: uppercase;
      font-size: 22px;
      letter-spacing: 0.01em;
      margin: 4px 0 20px;
      color: var(--deep);
    }
    .browse-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .browse-cat {
      display: block;
      text-align: left;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: var(--deep);
      background: var(--white);
      border: 1px solid var(--grey03);
      border-radius: 14px;
      padding: 18px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .browse-cat:hover { border-color: var(--purple); background: var(--rain50); color: var(--purple); transform: translateY(-2px); }
    .browse-cat .count { display: block; font-size: 12px; font-weight: 600; color: var(--grey05); margin-top: 4px; }

    /* ─── FOOTER ────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 40px 24px 60px;
      font-size: 13px;
      font-weight: 500;
      color: var(--grey05);
    }
    footer a { color: var(--purple); font-weight: 700; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .hero { padding: 56px 18px 90px; }
      .results-section { padding: 40px 18px 80px; }
      .card { padding: 22px 20px; }
    }
  </style>
</head>
<body>

  <!-- ─── HERO ───────────────────────────────────────────── -->
  <header class="hero">
    <div class="hero-inner">
      <span class="eyebrow">Homebase Brand · 2026</span>
      <h1 class="hero-title">Ask the <span class="accent">brand</span></h1>

      <div class="search-wrap">
        <div class="search-box">
          <span class="search-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="e.g. What purple do we use?" aria-label="Ask a brand question" />
          <button class="clear-btn" id="clear" aria-label="Clear">✕</button>
        </div>

        <div class="chips" id="chips">
          <button class="chip">What's our purple?</button>
          <button class="chip">Can I use yellow as a background?</button>
          <button class="chip">Which font for headlines?</button>
          <button class="chip">How should we sound?</button>
          <button class="chip">Where are the logo files?</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ─── RESULTS ────────────────────────────────────────── -->
  <main class="results-section">
    <div class="results-meta" id="meta"></div>
    <div id="results"></div>
  </main>

  <footer>
    Built from the <a href="index.html">Homebase Brand Guidelines 2026</a>. A proof of concept — answers link back to the live guide.
  </footer>

  /* ── Search engine (simple weighted token match) ─────────── */
  const norm = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, " ");
  const STOP = new Set(["the","a","an","is","are","do","i","we","our","to","of","for","and","in","on","how","what","which","can","should","use","using","with","when","where","my","me","us"]);

  function score(entry, tokens) {
    const hayTitle = norm(entry.title);
    const hayKw = norm(entry.keywords + " " + entry.cat);
    const hayBody = norm(entry.answer);
    let s = 0;
    for (const t of tokens) {
      if (hayTitle.includes(t)) s += 6;
      if (hayKw.includes(t)) s += 4;
      if (hayBody.includes(t)) s += 1;
    }
    return s;
  }

  function search(query) {
    const tokens = norm(query).split(/\s+/).filter(t => t.length > 1 && !STOP.has(t));
    if (!tokens.length) return [];
    return KB
      .map(e => ({ e, s: score(e, tokens) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .map(x => x.e);
  }

  /* ── Rendering ───────────────────────────────────────────── */
  const resultsEl = document.getElementById("results");
  const metaEl = document.getElementById("meta");
  const input = document.getElementById("q");
  const clearBtn = document.getElementById("clear");

  function cardHTML(e) {
    let sw = "";
    if (e.swatches) {
      sw = `<div class="swatches">` + e.swatches.map(s =>
        `<span class="swatch"><span class="dot" style="background:${s.hex}"></span>${s.name}<span class="hex">${s.hex}</span></span>`
      ).join("") + `</div>`;
    }
    return `<div class="card">
      <span class="tag">${e.cat}</span>
      <h3>${e.title}</h3>
      <div class="answer">${e.answer}${sw}</div>
      <a class="card-link" href="${e.link}">Open in the brand guide <span class="arrow">→</span></a>
    </div>`;
  }

  function renderResults(list, query) {
    if (!list.length) {
      metaEl.textContent = "";
      resultsEl.innerHTML = `<div class="empty">
        <h3>No direct match — yet</h3>
        <p>Try simpler words like <em>color</em>, <em>logo</em>, <em>font</em>, <em>voice</em>, or <em>photography</em> — or browse the full <a href="index.html">brand guide</a>.</p>
      </div>`;
      return;
    }
    metaEl.textContent = `${list.length} answer${list.length > 1 ? "s" : ""} for "${query}"`;
    resultsEl.innerHTML = list.map(cardHTML).join("");
  }

  function renderBrowse() {
    metaEl.textContent = "";
    const cats = {};
    KB.forEach(e => { cats[e.cat] = (cats[e.cat] || 0) + 1; });
    const grid = Object.keys(cats).map(c =>
      `<button class="browse-cat" data-cat="${c}">${c}<span class="count">${cats[c]} answer${cats[c] > 1 ? "s" : ""}</span></button>`
    ).join("");
    resultsEl.innerHTML = `<div class="browse-title">Or browse by topic</div><div class="browse-grid">${grid}</div>`;
    resultsEl.querySelectorAll(".browse-cat").forEach(btn => {
      btn.addEventListener("click", () => {
        const cat = btn.dataset.cat;
        input.value = cat;
        clearBtn.classList.add("show");
        const list = KB.filter(e => e.cat === cat);
        renderResults(list, cat);
        window.scrollTo({ top: document.querySelector(".results-section").offsetTop - 20, behavior: "smooth" });
      });
    });
  }

  function handleInput() {
    const q = input.value.trim();
    clearBtn.classList.toggle("show", q.length > 0);
    if (!q) { renderBrowse(); return; }
    renderResults(search(q), q);
  }

  input.addEventListener("input", handleInput);
  clearBtn.addEventListener("click", () => { input.value = ""; handleInput(); input.focus(); });

  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      input.value = chip.textContent;
      handleInput();
      window.scrollTo({ top: document.querySelector(".results-section").offsetTop - 20, behavior: "smooth" });
    });
  });

  // initial state
  renderBrowse();
  input.focus();
  </script>
